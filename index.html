<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR con Marcador - A-Frame + AR.js</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

  <!-- Librería principal de Realidad Virtual/Aumentada -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <!-- Librería AR.js que añade soporte de marcadores a A-Frame -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">

  <a-scene
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true;"
    arjs="sourceType: webcam; debugUIEnabled: false;">

    <!-- Precargamos el modelo 3D para que cargue rápido cuando aparezca el marcador -->
    <a-assets>
      <a-asset-item
        id="modelo-animal"
        src="https://raw.githubusercontent.com/AR-js-org/AR.js/master/aframe/examples/models/trex/scene.gltf">
      </a-asset-item>
    </a-assets>

    <!-- El marcador Hiro: cuando la cámara lo detecte, todo lo que esté DENTRO de esta etiqueta aparecerá -->
    <a-marker preset="hiro">

      <a-entity
        gltf-model="#modelo-animal"
        scale="0.05 0.05 0.05"
        position="0 0 0"
        rotation="0 0 0"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
      </a-entity>

    </a-marker>

    <!-- La cámara que usa el video del celular como fondo -->
    <a-entity camera></a-entity>

  </a-scene>

</body>
</html>
