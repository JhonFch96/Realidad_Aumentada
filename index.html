<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Primera Web de Realidad Aumentada</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;" 
        renderer="logarithmicDepthBuffer: true;">
        
        <a-assets>
            <a-asset-item id="modelo-pato" src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb"></a-asset-item>
        </a-assets>

        <a-marker preset="hiro">
            
            <a-entity 
                gltf-model="#modelo-pato" 
                scale="0.5 0.5 0.5" 
                position="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
            </a-entity>
            
        </a-marker>

        <a-entity camera></a-entity>

    </a-scene>

</body>
</html>
